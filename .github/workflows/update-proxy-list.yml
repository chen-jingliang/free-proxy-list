name: 更新代理列表

# 1. 核心权限配置（确保 Action 有权限写入你的 Fork 仓库）
permissions:
  contents: write
  actions: read
  pull-requests: write
  issues: write
  repository-projects: write

on:
  schedule:
    # 每天早上7点和晚上7点更新代理列表（北京时间）
    - cron: '0 23 * * *'  # 北京时间早上7点 (UTC 23:00)
    - cron: '0 11 * * *'  # 北京时间晚上7点 (UTC 11:00)
  workflow_dispatch:
    # 允许手动触发

# 2. 全局环境变量：强制将所有 Action 切换到 Node.js 24 运行，彻底根除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-proxies:
    runs-on: ubuntu-latest
        
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main          

    - name: 设置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
            
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4
            
    - name: 抓取代理列表
      run: |
        echo "开始抓取代理列表..."
        python generate_proxy_list.py
        echo "抓取完成，检查文件是否生成..."
        if [ -f proxy.txt ]; then
          echo "proxy.txt 文件已生成"
          echo "文件内容行数: $(wc -l < proxy.txt)"
          echo "文件内容预览："
          head -5 proxy.txt
        else
          echo "错误：proxy.txt 文件未生成！"
          exit 1
        fi
            
    - name: 提交更新
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        
        # 更加稳健的推送逻辑
        git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/${{ github.repository }}.git
        git add proxy.txt
        
        # 检查是否有内容变动
        if git diff --staged --quiet; then
          echo "【提示】proxy.txt 内容与仓库中的完全一致，没有发生任何变化，跳过提交。"
        else
          echo "检测到代理列表已更新，正在提交并推送到 main 分支..."
          git commit -m "更新代理列表 [skip ci]"
          git push origin HEAD:main
        fi
